services:
  ceramic-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ceramic-api:latest
    restart: "no"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    networks:
      - default

networks:
  default:
    external: true
    name: awesome_default
